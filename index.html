<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarBallTV - Live Sports</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 36px; color: #00ff88; margin-bottom: 10px; }
        .header p { color: #888; }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { background: #1a1a2e; color: #fff; padding: 8px 16px; border: 1px solid #333; border-radius: 4px; cursor: pointer; }
        .filter-btn.active { background: #00ff88; color: #000; border-color: #00ff88; }
        .channels { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .channel { background: #1a1a2e; border-radius: 8px; padding: 15px; cursor: pointer; transition: all 0.2s; border: 1px solid #333; }
        .channel:hover { border-color: #00ff88; transform: translateY(-2px); }
        .channel-name { font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .channel-country { color: #888; font-size: 12px; }
        .channel-type { color: #00ff88; font-size: 12px; }
        .live-badge { background: #ff4444; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px; }
        .stats { text-align: center; margin-bottom: 20px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⭐ StarBallTV</h1>
            <p>Free Live Sports Streaming</p>
        </div>
        <div class="stats" id="stats">Loading channels...</div>
        <div class="filters" id="filters"></div>
        <div class="channels" id="channels"></div>
    </div>

    <script>
        let allChannels = [];
        let currentFilter = 'all';

        async function loadChannels() {
            try {
                const res = await fetch('/matches.json');
                allChannels = await res.json();

                // Get unique countries
                const countries = [...new Set(allChannels.map(c => c.country))].sort();

                // Create filter buttons
                const filtersEl = document.getElementById('filters');
                filtersEl.innerHTML = `
                    <button class="filter-btn active" onclick="filterChannels('all')">All (${allChannels.length})</button>
                    ${countries.map(c => {
                        const count = allChannels.filter(ch => ch.country === c).length;
                        return `<button class="filter-btn" onclick="filterChannels('${c}')">${c} (${count})</button>`;
                    }).join('')}
                `;

                filterChannels('all');
            } catch (err) {
                document.getElementById('channels').innerHTML = `<div style="color: #ff4444;">Error loading channels: ${err.message}</div>`;
            }
        }

        function filterChannels(country) {
            currentFilter = country;
            const filtered = country === 'all' ? allChannels : allChannels.filter(c => c.country === country);

            document.getElementById('stats').textContent = `Showing ${filtered.length} of ${allChannels.length} channels`;

            // Update active filter button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(country === 'all' ? 'All' : country)) {
                    btn.classList.add('active');
                }
            });

            // Render channels
            const channelsEl = document.getElementById('channels');
            channelsEl.innerHTML = filtered.map(ch => `
                <div class="channel" onclick="watchChannel('${ch.slug}')">
                    <div class="channel-name">
                        ${ch.name}
                        <span class="live-badge">LIVE</span>
                    </div>
                    <div class="channel-country">${ch.country} • ${ch.type}</div>
                </div>
            `).join('');
        }

        function watchChannel(slug) {
            window.location.href = `/watch?servid=${slug}&id=0`;
        }

        loadChannels();
    </script>
</body>
</html>
