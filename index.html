        async function loadChannels() {
            try {
                const res = await fetch('/matches.json');
                allChannels = await res.json();

                // Get unique countries
                const countries = [...new Set(allChannels.map(c => c.country))].sort();

                // Create filter buttons
                const filtersEl = document.getElementById('filters');

            } catch (err) {
                document.getElementById('channels').innerHTML = `<div style="color: #ff4444;">Error loading channels: ${err.message}</div>`;
            }

        function filterChannels(country) {
            currentFilter = country;
            const filtered = country === 'all' ? allChannels : allChannels.filter(c => c.country === country);

            document.getElementById('stats').textContent = `Showing ${filtered.length} of ${allChannels.length} channels`;

  <script>
    const MATCHES_API = 'matches.json';
    let matches = [];

    function getStreamType(url) {
      if (url.includes('.m3u8')) return 'hls';
      if (url.includes('.mpd')) return 'dash';
      return 'other';
    }

    function cardHTML(m) {
      const type = getStreamType(m.stream.url);
      const typeLabel = type.toUpperCase();
      return `<div class="card live" data-country="${m.competition.split(' ')[0]}" data-type="${type}" onclick="watchChannel('${encodeURIComponent(m.stream.url)}','${encodeURIComponent(m.home.name)}','${type}')">
        <div class="card-top">
          <span class="comp">${m.competition}</span>
          <span class="country">${m.away.name}</span>
        </div>
        <div class="teams">
          <div class="team">
            <span class="team-name">${m.home.name}</span>
          </div>
        </div>
        <div class="card-bottom">
          <span class="badge live">LIVE</span>
          <span style="font-size:10px;color:var(--text2)">${typeLabel}</span>
          <button class="watch-btn">Watch</button>
        </div>
      </div>`;
    }

    function render() {
      const country = document.getElementById('fCountry').value;
      const type = document.getElementById('fType').value;
      const q = document.getElementById('fSearch').value.toLowerCase();
      
      let list = matches.filter(m => {
        if (country !== 'all' && !m.competition.startsWith(country)) return false;
        if (type !== 'all' && getStreamType(m.stream.url) !== type) return false;
        if (q && !m.home.name.toLowerCase().includes(q)) return false;
        return true;
      });

      document.getElementById('grid').innerHTML = list.length 
        ? list.map(cardHTML).join('') 
        : '<div class="empty">No channels found</div>';
    }

    function watchChannel(url, name, type) {
      const decodedUrl = decodeURIComponent(url);
      const decodedName = decodeURIComponent(name);
      window.location.href = `watch.html?url=${encodeURIComponent(decodedUrl)}&name=${encodeURIComponent(decodedName)}&type=${type}`;
    }

    async function load() {
      try {
        const r = await fetch(MATCHES_API + '?t=' + Date.now());
        matches = await r.json();
        
        // Populate country filter
        const countries = [...new Set(matches.map(m => m.competition.split(' ')[0]))];
        const sel = document.getElementById('fCountry');
        sel.innerHTML = '<option value="all">All Countries</option>' + 
          countries.map(c => `<option value="${c}">${c}</option>`).join('');
        
        render();
      } catch (e) {
        document.getElementById('grid').innerHTML = '<div class="empty">Error loading channels</div>';
      }
    }

    document.getElementById('fCountry').addEventListener('change', render);
    document.getElementById('fType').addEventListener('change', render);
    document.getElementById('fSearch').addEventListener('input', render);

    load();
  </script>
