<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarBallTV - Player</title>
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/starballtv/img/f1.png">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0a0f;--card:#14141c;--accent:#f8b400;--text:#e2e8f0;--text2:#94a3b8;--border:rgba(255,255,255,0.06)}
    body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column}
    .player-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(20,20,28,.98);border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
    .player-info{font-size:13px;font-weight:600}
    .back-btn{background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;text-decoration:none}
    .back-btn:hover{color:var(--accent)}
    .player-wrap{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center}
    .player-wrap video{width:100%;height:100%;object-fit:contain}
    .loading{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--text2)}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-msg{color:#ff4444;font-size:13px;text-align:center;padding:20px}
    @media(max-width:768px){.player-bar{padding:8px 12px}.player-info{font-size:12px}}
  </style>
</head>
<body>
  <div class="player-bar">
    <a href="/" class="back-btn">← Back</a>
    <div class="player-info" id="playerInfo">Loading...</div>
  </div>
  <div class="player-wrap" id="playerWrap">
    <div class="loading" id="loadingIndicator">
      <div class="spinner"></div>
      <span>Loading stream...</span>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const streamUrl = params.get('url');
    const streamName = params.get('name') || 'Live Stream';
    const streamType = params.get('type') || 'hls';

    document.getElementById('playerInfo').textContent = streamName;
    document.title = streamName + ' - StarBallTV';

    function hideLoading() {
      const el = document.getElementById('loadingIndicator');
      if (el) el.remove();
    }

    function showError(msg) {
      hideLoading();
      const wrap = document.getElementById('playerWrap');
      wrap.innerHTML = `<div class="error-msg">${msg}</div>`;
    }

    function playStream(url, type) {
      hideLoading();
      const wrap = document.getElementById('playerWrap');
      
      if (type === 'hls') {
        if (Hls.isSupported()) {
          const video = document.createElement('video');
          video.controls = true;
          video.autoplay = true;
          video.playsInline = true;
          
          const hls = new Hls({
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
            startFragPrefetch: true,
          });
          
          hls.loadSource(url);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(() => {});
          });
          
          hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
              if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                showError('Network error - stream may be unavailable');
              } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                hls.recoverMediaError();
              } else {
                showError('Playback error: ' + data.details);
              }
            }
          });
          
          wrap.innerHTML = '';
          wrap.appendChild(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          // Native HLS (Safari)
          const video = document.createElement('video');
          video.controls = true;
          video.autoplay = true;
          video.playsInline = true;
          video.src = url;
          wrap.innerHTML = '';
          wrap.appendChild(video);
        } else {
          showError('HLS not supported in this browser');
        }
      } else {
        // DASH or other
        const video = document.createElement('video');
        video.controls = true;
        video.autoplay = true;
        video.playsInline = true;
        video.src = url;
        wrap.innerHTML = '';
        wrap.appendChild(video);
      }
    }

    if (!streamUrl) {
      showError('No stream URL provided');
    } else {
      // Use proxy for CORS
      const proxyUrl = `/api/proxy?url=${encodeURIComponent(streamUrl)}`;
      playStream(proxyUrl, streamType);
    }
  </script>
</body>
</html>
