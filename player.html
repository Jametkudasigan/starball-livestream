<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarBallTV - Watch</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .header h1 { font-size: 24px; color: #00ff88; }
        .player-wrapper { position: relative; width: 100%; background: #000; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; }
        .info { margin-top: 20px; padding: 15px; background: #1a1a2e; border-radius: 8px; }
        .info h2 { color: #00ff88; margin-bottom: 10px; }
        .info p { color: #888; font-size: 14px; }
        .error { color: #ff4444; margin-top: 10px; }
        .loading { color: #00ff88; margin-top: 10px; }
        .back-btn { background: #00ff88; color: #000; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; }
        .back-btn:hover { background: #00cc6a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="back-btn">← Back</a>
            <h1>⭐ StarBallTV</h1>
        </div>
        <div class="player-wrapper">
            <video id="video" controls autoplay></video>
        </div>
        <div class="info">
            <h2 id="channel-name">Loading...</h2>
            <p id="channel-url"></p>
            <div id="status"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const channelName = document.getElementById('channel-name');
        const channelUrl = document.getElementById('channel-url');
        const status = document.getElementById('status');

        const params = new URLSearchParams(window.location.search);
        const servid = params.get('servid');
        const id = params.get('id') || '0';

        if (!servid) {
            channelName.textContent = 'No channel selected';
            status.innerHTML = '<div class="error">Missing servid parameter</div>';
        } else {
            loadChannel(servid, id);
        }

        async function loadChannel(slug, channelIndex) {
            try {
                status.innerHTML = '<div class="loading">Loading channel config...</div>';

                // Fetch serv config
                const configRes = await fetch(`/serv/${slug}.json`);
                if (!configRes.ok) throw new Error('Channel config not found');

                const config = await configRes.json();
                const channels = config.buttonsData;

                // Find the channel
                let channel = null;
                for (const [group, items] of Object.entries(channels)) {
                    const idx = parseInt(channelIndex);
                    if (idx < items.length) {
                        channel = items[idx];
                        break;
                    }
                }

                if (!channel) throw new Error('Channel not found');

                // Get the actual stream URL from matches.json
                const matchesRes = await fetch('/matches.json');
                const matches = await matchesRes.json();
                const match = matches.find(m => m.slug === slug);

                if (!match) throw new Error('Stream URL not found');

                channelName.textContent = match.name;
                channelUrl.textContent = `Stream: ${match.url}`;

                // Load HLS stream through proxy
                const streamUrl = `/api/proxy?url=${encodeURIComponent(match.url)}`;

                if (Hls.isSupported()) {
                    const hls = new Hls({
                        maxBufferLength: 30,
                        maxMaxBufferLength: 60,
                    });
                    hls.loadSource(streamUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play().catch(() => {});
                        status.innerHTML = '<div class="loading" style="color: #00ff88;">Stream loaded successfully!</div>';
                    });
                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            status.innerHTML = `<div class="error">Stream error: ${data.type}</div>`;
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Native HLS (Safari)
                    video.src = streamUrl;
                    video.addEventListener('loadedmetadata', () => {
                        video.play().catch(() => {});
                        status.innerHTML = '<div class="loading" style="color: #00ff88;">Stream loaded successfully!</div>';
                    });
                } else {
                    status.innerHTML = '<div class="error">HLS not supported in this browser</div>';
                }
            } catch (err) {
                status.innerHTML = `<div class="error">Error: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
